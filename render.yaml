# Render.com blueprint for the backend API.
# In the Render dashboard you can also just point at this repo and it will
# read these settings. The free plan sleeps after ~15 min idle.
services:
  - type: web
    name: deal-screener-api
    runtime: python
    plan: free
    buildCommand: "pip install -e .[api]"
    startCommand: "uvicorn dealscreener.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
